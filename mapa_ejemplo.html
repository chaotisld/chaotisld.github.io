    ]
};

// 3. Función para manejar los clics en cada polígono
function onEachFeature(feature, layer) {
    layer.on({
        click: function(e) {
            // A) ACERCAR LA ZONA: Ajusta el zoom a los límites exactos del polígono
            map.fitBounds(e.target.getBounds());

            // B) MOSTRAR DATOS: Actualiza el panel lateral
            document.getElementById('instruccion').style.display = 'none';
            document.getElementById('datos-container').style.display = 'block';
            
            document.getElementById('nombre-mun').innerText = feature.properties.nombre;
            document.getElementById('pob-total').innerText = feature.properties.poblacion;
            document.getElementById('rezago-nivel').innerText = feature.properties.rezago;
            document.getElementById('uso-suelo').innerText = feature.properties.uso_suelo;
        }
    });
}

// 4. Agregar el GeoJSON al mapa con estilos
L.geoJSON(municipiosGeoJSON, {
    style: function (feature) {
        return {
            color: '#1e5631',      // Color del borde
            weight: 2,             // Grosor del borde
            fillColor: '#4caf50',  // Color de relleno
            fillOpacity: 0.3       // Transparencia
        };
    },
    onEachFeature: onEachFeature
}).addTo(map);


    </script>
</body>

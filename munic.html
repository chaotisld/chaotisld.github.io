<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Polígono</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Eliminar márgenes por defecto y asignar una fuente */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        /* El contenedor del mapa DEBE tener un tamaño definido */
        #map {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>

            "features": [
                {
                    "geometry": {

                        "coordinates": [

                                [ -98.21075847280039, 20.24190580475411], [ -98.21073701512138, 20.242049248401777], [-98.21034138929821, 20.24199828817453], [-98.21025153528467, 20.242031003384824], [-98.21015296410827, 20.24204421529436], [-98.20936975909122, 20.24179822193464], [-98.20922559035101, 20.24139557211592], [-98.2090807510535, 20.241257790136252], 
                                [-98.20893322956063, 20.241096729774704], [-98.20863617491774, 20.240943218960787], [-98.2083907527901, 20.240275696811118], [-98.20828055315623, 20.239535148383343], [-98.2082986580654, 20.239370311338153], [ -98.20842136912658, 20.23907146510137], [-98.20862521700421, 20.238692086848438], [-98.20882101826004, 20.238493274654367], 
                                [ -98.20892763607007, 20.238353602644544], [ -98.20974051760484, 20.236930478535506], [ -98.2099041323466, 20.236698318607267], [  -98.20994570658841, 20.236562419947205], [ -98.21017302380184, 20.236368638322606], [ -98.21065984473383, 20.23621260618859],[ -98.21079328463757, 20.236182406402044], [-98.21101791964254, 20.23614780247305],

                            ]
                        ]
                    },
                    "type": "Feature", 
                    "properties": {
                        "Nom": "Unidad Territorial de Primer Orden", 
                        "Shape_Area": 563477266.777, 
                        "OBJECTID": 1, 
                        "km2": 563.4772667769, 
                        "FID": 0, 
                        "Shape_Leng": 203978.807739, 
                        "ha": 56347.72667768984, 
                        "Id": 1
                    }
                }
            ]
        };

        // 4. Inicializar el mapa
        var map = L.map('map');

        // 5. Añadir la capa base (los mapas de calles de OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'Map data &copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
            maxZoom: 19
        }).addTo(map);

        // 6. Cargar los datos GeoJSON en el mapa y darle algo de estilo
        var geojsonLayer = L.geoJson(dataMunic, {
            style: function (feature) {
                return {
                    color: "#2563eb", // Color del borde (azul)
                    weight: 2,        // Grosor del borde
                    opacity: 1,       // Opacidad del borde
                    fillColor: "#3b82f6", // Color de relleno interior
                    fillOpacity: 0.3  // Transparencia del relleno
                };
            }
        }).addTo(map);

        // 7. Ajustar automáticamente la vista del mapa para que el polígono quede centrado en pantalla
        map.fitBounds(geojsonLayer.getBounds());

    </script>
</body>
</html>
